<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patch Notes Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Titillium+Web:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="motion-bar" aria-hidden="true"></div>
    <div class="motion-bar motion-bar--alt" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-chevron" aria-hidden="true"></div>

    <div class="app">
      <header class="header">
        <div class="header-main">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">PN</span>
            <div>
              <h1>Patch Notes Monitor</h1>
              <p class="tagline">BaaS &amp; database changelog timing</p>
            </div>
          </div>

          <div class="header-actions">
            <label class="control control-date">
              <span class="control-label">Session</span>
              <select id="dateSelect" disabled>
                <option>Loading…</option>
              </select>
            </label>
            <button type="button" id="refreshBtn" class="btn btn-icon" title="Reload report">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6" />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <section id="stats" class="timing-board" hidden>
        <article class="timing-cell timing-cell--highlight">
          <span class="timing-label">New today</span>
          <span class="timing-value" id="statNew">0</span>
        </article>
        <article class="timing-cell">
          <span class="timing-label">Platforms</span>
          <span class="timing-value" id="statTotal">0</span>
        </article>
        <article class="timing-cell timing-cell--meta">
          <span class="timing-label">Generated</span>
          <span class="timing-value timing-value--mono" id="statGenerated">—</span>
        </article>
      </section>

      <main id="content" class="content">
        <div class="loading">
          <div class="loading-bar"><span></span></div>
          <p>Loading digest…</p>
        </div>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
