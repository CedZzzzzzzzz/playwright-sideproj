<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patch Notes Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="app">
      <header class="header">
        <div class="brand">
          <span class="brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" />
              <circle cx="12" cy="12" r="4" />
            </svg>
          </span>
          <div>
            <h1>Patch Notes Monitor</h1>
            <p class="tagline">Daily digest for DbaaS & database changelogs</p>
          </div>
        </div>
        <div class="header-actions">
          <label class="date-picker">
            <span class="sr-only">Report date</span>
            <select id="dateSelect" disabled>
              <option>Loading…</option>
            </select>
          </label>
          <button type="button" id="refreshBtn" class="btn btn-ghost" title="Reload report">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6" />
            </svg>
          </button>
        </div>
      </header>

      <section id="stats" class="stats" hidden>
        <article class="stat-card stat-new">
          <span class="stat-value" id="statNew">0</span>
          <span class="stat-label">New today</span>
        </article>
        <article class="stat-card">
          <span class="stat-value" id="statTotal">0</span>
          <span class="stat-label">Platforms</span>
        </article>
        <article class="stat-card stat-muted">
          <span class="stat-value stat-mono" id="statGenerated">—</span>
          <span class="stat-label">Generated</span>
        </article>
      </section>

      <main id="content" class="content">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading digest…</p>
        </div>
      </main>

    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
