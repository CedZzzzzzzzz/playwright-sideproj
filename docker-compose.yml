services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-monitoring
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  monitor:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./logs:/app/logs
      - ./targets.json:/app/targets.json
    restart: unless-stopped

  dashboard:
    build: .
    command: node src/server.js
    ports:
      - "3000:3000"
    environment:
      - LOGS_DIR=/app/logs
      - UI_PORT=3000
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  ollama_data: